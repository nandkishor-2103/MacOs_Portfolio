<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Solid macOS Style Base -->
  <rect x="128" y="128" width="768" height="768" rx="170" fill="url(#bg-grad)"/>
  
  <!-- Subtle Glass Highlight -->
  <rect x="128" y="128" width="768" height="768" rx="170" stroke="white" stroke-width="20" opacity="0.1"/>

  <!-- High Visibility Code Symbols < > -->
  <path d="M320 420L220 512L320 604" stroke="url(#accent-grad)" stroke-width="60" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M704 420L804 512L704 604" stroke="url(#accent-grad)" stroke-width="60" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Crisp White 'N' -->
  <path d="M420 630V394.5L604 630V394.5" stroke="white" stroke-width="70" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
